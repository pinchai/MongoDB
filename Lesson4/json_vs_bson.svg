<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
    .code-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #222222; }
    .desc { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .box { fill: #FAFAFA; stroke: #222222; stroke-width: 1.5; rx: 5; }
    .sep-line { stroke: #DDDDDD; stroke-width: 1.5; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- LEFT: JSON -->
  <text x="30" y="35" class="title">JSON (JavaScript Object Notation)</text>
  
  <rect x="30" y="55" width="230" height="75" class="box" />
  <text x="45" y="75" class="code-text" fill="#111111">{</text>
  <text x="60" y="93" class="code-text">"name": "Dara",</text>
  <text x="60" y="110" class="code-text">"age": 20</text>
  <text x="45" y="123" class="code-text">}</text>

  <g transform="translate(30, 145)">
    <text x="0" y="15" class="desc">• Format: **Plain Text** (Unicode)</text>
    <text x="0" y="32" class="desc">• Parsing: Relatively slower (needs text scanning)</text>
    <text x="0" y="49" class="desc">• Types: String, Number, Boolean, Array, Object, Null</text>
  </g>

  <!-- MIDDLE SEPARATOR -->
  <line x1="300" y1="20" x2="300" y2="220" class="sep-line" />

  <!-- RIGHT: BSON -->
  <text x="330" y="35" class="title">BSON (Binary JSON)</text>

  <rect x="330" y="55" width="240" height="75" class="box" />
  <!-- A binary hex presentation -->
  <text x="345" y="75" class="code-text" style="font-weight: bold;">\x16\x00\x00\x00\x02name\x00\x05\x00\x00\x00</text>
  <text x="345" y="95" class="code-text" style="font-weight: bold;">Dara\x00\x10age\x00\x14\x00\x00\x00\x00</text>
  <text x="345" y="115" class="desc" font-size="10" fill="#888888">(Binary representation: size + type + value)</text>

  <g transform="translate(330, 145)">
    <text x="0" y="15" class="desc">• Format: **Binary** format (Optimized space/speed)</text>
    <text x="0" y="32" class="desc">• Parsing: Fast (stores length prefixes for quick skips)</text>
    <text x="0" y="49" class="desc">• Types: JSON types + **Date, ObjectId, Binary, Decimal128**</text>
  </g>
</svg>
