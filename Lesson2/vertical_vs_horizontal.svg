<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #222222; }
    .server-label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: bold; fill: #555555; }
    .server-line { fill: #FAFAFA; stroke: #222222; stroke-width: 1.5; rx: 3; }
    .led { fill: #111111; }
    .sep-line { stroke: #DDDDDD; stroke-width: 1.5; stroke-dasharray: 4; }
    .arrow { stroke: #222222; stroke-width: 2; fill: none; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- LEFT: Vertical Scaling -->
  <text x="30" y="40" class="title">Vertical Scaling (Scale Up)</text>

  <!-- Small Server -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="60" height="25" class="server-line" />
    <circle cx="10" cy="12" r="2" class="led" />
    <circle cx="18" cy="12" r="2" class="led" />
    <line x1="28" y1="12" x2="52" y2="12" stroke="#888888" stroke-width="1.5" />
    <text x="30" y="-5" class="server-label" text-anchor="middle">CPU/RAM</text>
  </g>

  <!-- Growth Arrow -->
  <path d="M 125 102 L 155 102" class="arrow" />
  <polygon points="153,98 161,102 153,106" fill="#222222" />

  <!-- Giant Server -->
  <g transform="translate(180, 60)">
    <rect x="0" y="0" width="80" height="75" class="server-line" />
    <circle cx="15" cy="20" r="3" class="led" />
    <circle cx="27" cy="20" r="3" class="led" />
    <line x1="42" y1="20" x2="68" y2="20" stroke="#888888" stroke-width="2" />
    
    <circle cx="15" cy="40" r="3" class="led" />
    <circle cx="27" cy="40" r="3" class="led" />
    <line x1="42" y1="40" x2="68" y2="40" stroke="#888888" stroke-width="2" />

    <circle cx="15" cy="60" r="3" class="led" />
    <circle cx="27" cy="60" r="3" class="led" />
    <line x1="42" y1="60" x2="68" y2="60" stroke="#888888" stroke-width="2" />
    <text x="40" y="-10" class="server-label" text-anchor="middle">Bigger Server</text>
  </g>

  <!-- Label -->
  <text x="145" y="205" class="label" text-anchor="middle">Add resources (hardware) to one single machine</text>

  <!-- MIDDLE SEPARATOR -->
  <line x1="300" y1="30" x2="300" y2="210" class="sep-line" />

  <!-- RIGHT: Horizontal Scaling -->
  <text x="330" y="40" class="title">Horizontal Scaling (Scale Out)</text>

  <!-- Server 1 -->
  <g transform="translate(330, 80)">
    <rect x="0" y="0" width="60" height="40" class="server-line" />
    <circle cx="10" cy="15" r="2.5" class="led" />
    <circle cx="20" cy="15" r="2.5" class="led" />
    <line x1="30" y1="15" x2="50" y2="15" stroke="#888888" stroke-width="1.5" />
    
    <circle cx="10" cy="27" r="2.5" class="led" />
    <circle cx="20" cy="27" r="2.5" class="led" />
    <line x1="30" y1="27" x2="50" y2="27" stroke="#888888" stroke-width="1.5" />
  </g>

  <!-- Server 2 -->
  <g transform="translate(410, 80)">
    <rect x="0" y="0" width="60" height="40" class="server-line" />
    <circle cx="10" cy="15" r="2.5" class="led" />
    <circle cx="20" cy="15" r="2.5" class="led" />
    <line x1="30" y1="15" x2="50" y2="15" stroke="#888888" stroke-width="1.5" />
    
    <circle cx="10" cy="27" r="2.5" class="led" />
    <circle cx="20" cy="27" r="2.5" class="led" />
    <line x1="30" y1="27" x2="50" y2="27" stroke="#888888" stroke-width="1.5" />
  </g>

  <!-- Server 3 -->
  <g transform="translate(490, 80)">
    <rect x="0" y="0" width="60" height="40" class="server-line" />
    <circle cx="10" cy="15" r="2.5" class="led" />
    <circle cx="20" cy="15" r="2.5" class="led" />
    <line x1="30" y1="15" x2="50" y2="15" stroke="#888888" stroke-width="1.5" />
    
    <circle cx="10" cy="27" r="2.5" class="led" />
    <circle cx="20" cy="27" r="2.5" class="led" />
    <line x1="30" y1="27" x2="50" y2="27" stroke="#888888" stroke-width="1.5" />
  </g>

  <!-- Connecting network bus line -->
  <line x1="360" y1="135" x2="520" y2="135" stroke="#222222" stroke-width="2" />
  <line x1="360" y1="120" x2="360" y2="135" stroke="#222222" stroke-width="2" />
  <line x1="440" y1="120" x2="440" y2="135" stroke="#222222" stroke-width="2" />
  <line x1="520" y1="120" x2="520" y2="135" stroke="#222222" stroke-width="2" />

  <!-- Label -->
  <text x="440" y="205" class="label" text-anchor="middle">Add more machines (nodes) to the cluster</text>
</svg>
