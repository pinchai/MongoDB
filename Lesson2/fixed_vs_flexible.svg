<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #222222; }
    .header-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: bold; fill: #111111; }
    .cell-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #333333; }
    .null-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #999999; font-style: italic; }
    .json-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #111111; }
    .border-line { stroke: #222222; stroke-width: 1.5; fill: none; }
    .grid-line { stroke: #CCCCCC; stroke-width: 1; fill: none; }
    .doc-bg { fill: #FAFAFA; stroke: #222222; stroke-width: 1.2; rx: 4; }
    .sep-line { stroke: #DDDDDD; stroke-width: 1.5; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- LEFT: SQL Fixed Schema -->
  <text x="30" y="40" class="title">SQL Fixed Schema</text>

  <!-- Table Grid -->
  <rect x="30" y="60" width="230" height="110" stroke="#222222" stroke-width="1.5" fill="#FAFAFA" rx="4" />
  <line x1="30" y1="85" x2="260" y2="85" stroke="#222222" stroke-width="1.2" />
  <line x1="30" y1="113" x2="260" y2="113" class="grid-line" />
  <line x1="30" y1="141" x2="260" y2="141" class="grid-line" />
  
  <line x1="60" y1="60" x2="60" y2="170" class="grid-line" />
  <line x1="115" y1="60" x2="115" y2="170" class="grid-line" />
  <line x1="165" y1="60" x2="165" y2="170" class="grid-line" />

  <!-- Column Headers -->
  <text x="45" y="76" class="header-text" text-anchor="middle">id</text>
  <text x="87" y="76" class="header-text" text-anchor="middle">name</text>
  <text x="140" y="76" class="header-text" text-anchor="middle">age</text>
  <text x="212" y="76" class="header-text" text-anchor="middle">email</text>

  <!-- Row 1 -->
  <text x="45" y="102" class="cell-text" text-anchor="middle">1</text>
  <text x="87" y="102" class="cell-text" text-anchor="middle">"Dara"</text>
  <text x="140" y="102" class="cell-text" text-anchor="middle">20</text>
  <text x="212" y="102" class="cell-text" font-size="9" text-anchor="middle">"dara@..."</text>

  <!-- Row 2 -->
  <text x="45" y="130" class="cell-text" text-anchor="middle">2</text>
  <text x="87" y="130" class="cell-text" text-anchor="middle">"Sok"</text>
  <text x="140" y="130" class="cell-text" text-anchor="middle">19</text>
  <text x="212" y="130" class="null-text" text-anchor="middle">NULL</text>

  <!-- Row 3 -->
  <text x="45" y="158" class="cell-text" text-anchor="middle">3</text>
  <text x="87" y="158" class="cell-text" text-anchor="middle">"Bona"</text>
  <text x="140" y="158" class="cell-text" text-anchor="middle">22</text>
  <text x="212" y="158" class="null-text" text-anchor="middle">NULL</text>

  <!-- Label -->
  <text x="145" y="205" class="label" text-anchor="middle">All rows must have exact same columns</text>

  <!-- MIDDLE SEPARATOR -->
  <line x1="300" y1="30" x2="300" y2="210" class="sep-line" />

  <!-- RIGHT: MongoDB Flexible Schema -->
  <text x="330" y="40" class="title">MongoDB Flexible Schema</text>

  <!-- Doc 1 -->
  <rect x="330" y="60" width="240" height="32" class="doc-bg" />
  <text x="340" y="80" class="json-text">{"name": "Dara", "age": 20, "email": "dara@..."}</text>

  <!-- Doc 2 -->
  <rect x="330" y="98" width="240" height="32" class="doc-bg" />
  <text x="340" y="118" class="json-text">{"name": "Sok", "age": 19}</text>

  <!-- Doc 3 -->
  <rect x="330" y="136" width="240" height="32" class="doc-bg" />
  <text x="340" y="156" class="json-text">{"name": "Bona", "skills": ["JS", "MongoDB"]}</text>

  <!-- Label -->
  <text x="450" y="205" class="label" text-anchor="middle">Documents can have different structures</text>
</svg>
