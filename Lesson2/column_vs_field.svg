<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #222222; }
    .header-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .cell-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #333333; }
    .json-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #111111; }
    .border-line { stroke: #222222; stroke-width: 1.5; fill: none; }
    .grid-line { stroke: #CCCCCC; stroke-width: 1; fill: none; }
    .highlight-col { fill: #EAEAEA; stroke: #111111; stroke-width: 1.8; }
    .highlight-field { fill: #EAEAEA; stroke: #111111; stroke-width: 1.5; rx: 3; }
    .doc-bg { fill: #FAFAFA; stroke: #222222; stroke-width: 1.5; rx: 6; }
    .sep-line { stroke: #DDDDDD; stroke-width: 1.5; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- LEFT: SQL Column -->
  <text x="30" y="40" class="title">SQL Database (Column)</text>

  <!-- Table Outline -->
  <rect x="30" y="60" width="220" height="110" stroke="#CCCCCC" stroke-width="1" fill="none" rx="4" />
  
  <!-- Highlighted Column (name column) -->
  <rect x="85" y="60" width="90" height="110" class="highlight-col" fill-opacity="0.85" />

  <line x1="30" y1="85" x2="250" y2="85" class="grid-line" />
  <line x1="30" y1="110" x2="250" y2="110" class="grid-line" />
  <line x1="30" y1="138" x2="250" y2="138" class="grid-line" />
  
  <line x1="85" y1="60" x2="85" y2="170" class="grid-line" stroke-width="1.5" />
  <line x1="175" y1="60" x2="175" y2="170" class="grid-line" stroke-width="1.5" />

  <!-- Column Headers -->
  <text x="57" y="75" class="header-text" text-anchor="middle">id</text>
  <text x="130" y="75" class="header-text" text-anchor="middle" style="font-weight: bold; fill: #111111;">name (Column)</text>
  <text x="212" y="75" class="header-text" text-anchor="middle">age</text>

  <!-- Row 1 -->
  <text x="57" y="102" class="cell-text" text-anchor="middle">1</text>
  <text x="130" y="102" class="cell-text" text-anchor="middle" style="font-weight: bold;">"Dara"</text>
  <text x="212" y="102" class="cell-text" text-anchor="middle">20</text>

  <!-- Row 2 -->
  <text x="57" y="128" class="cell-text" text-anchor="middle">2</text>
  <text x="130" y="128" class="cell-text" text-anchor="middle" style="font-weight: bold;">"Sok"</text>
  <text x="212" y="128" class="cell-text" text-anchor="middle">19</text>

  <!-- Row 3 -->
  <text x="57" y="158" class="cell-text" text-anchor="middle">3</text>
  <text x="130" y="158" class="cell-text" text-anchor="middle" style="font-weight: bold;">"Bona"</text>
  <text x="212" y="158" class="cell-text" text-anchor="middle">22</text>

  <!-- Label -->
  <text x="140" y="205" class="label" text-anchor="middle">Vertical data attribute across all rows</text>

  <!-- MIDDLE SEPARATOR -->
  <line x1="300" y1="30" x2="300" y2="210" class="sep-line" />

  <!-- RIGHT: MongoDB Field -->
  <text x="330" y="40" class="title">MongoDB (Field)</text>

  <!-- Document Container -->
  <rect x="330" y="60" width="240" height="110" class="doc-bg" />
  
  <!-- Highlighted Field Box -->
  <rect x="362" y="109" width="180" height="22" class="highlight-field" fill-opacity="0.85" />

  <text x="350" y="85" class="json-text">{</text>
  <text x="370" y="103" class="json-text">"_id": ObjectId("..."),</text>
  <text x="370" y="125" class="json-text" style="font-weight: bold;">"name": "Sok", <tspan font-weight="normal" fill="#555555">(Field)</tspan></text>
  <text x="370" y="147" class="json-text">"age": 19</text>
  <text x="350" y="163" class="json-text">}</text>

  <!-- Label -->
  <text x="450" y="205" class="label" text-anchor="middle">Key-value pair within a single document</text>
</svg>
