<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #222222; }
    .header-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .cell-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #333333; }
    .json-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #111111; }
    .border-line { stroke: #222222; stroke-width: 1.5; fill: none; }
    .grid-line { stroke: #CCCCCC; stroke-width: 1; fill: none; }
    .highlight-row { fill: #EAEAEA; stroke: #111111; stroke-width: 1.8; }
    .doc-bg { fill: #FAFAFA; stroke: #222222; stroke-width: 1.5; rx: 6; }
    .sep-line { stroke: #DDDDDD; stroke-width: 1.5; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- LEFT: SQL Row -->
  <text x="30" y="40" class="title">SQL Database (Row / Record)</text>

  <!-- Table Outline -->
  <rect x="30" y="60" width="220" height="110" stroke="#CCCCCC" stroke-width="1" fill="none" rx="4" />
  <line x1="30" y1="85" x2="250" y2="85" class="grid-line" />
  <line x1="30" y1="110" x2="250" y2="110" class="grid-line" />
  <line x1="30" y1="138" x2="250" y2="138" class="grid-line" />
  
  <line x1="85" y1="60" x2="85" y2="170" class="grid-line" />
  <line x1="175" y1="60" x2="175" y2="170" class="grid-line" />

  <!-- Column Headers -->
  <text x="57" y="75" class="header-text" text-anchor="middle">id</text>
  <text x="130" y="75" class="header-text" text-anchor="middle">name</text>
  <text x="212" y="75" class="header-text" text-anchor="middle">age</text>

  <!-- Row 1 -->
  <text x="57" y="102" class="cell-text" text-anchor="middle">1</text>
  <text x="130" y="102" class="cell-text" text-anchor="middle">"Dara"</text>
  <text x="212" y="102" class="cell-text" text-anchor="middle">20</text>

  <!-- Row 2 (Highlighted Row) -->
  <rect x="30" y="110" width="220" height="28" class="highlight-row" fill-opacity="0.85" />
  <text x="57" y="128" class="cell-text" text-anchor="middle" style="font-weight: bold;">2</text>
  <text x="130" y="128" class="cell-text" text-anchor="middle" style="font-weight: bold;">"Sok"</text>
  <text x="212" y="128" class="cell-text" text-anchor="middle" style="font-weight: bold;">19</text>

  <!-- Row 3 (Regular) -->
  <text x="57" y="158" class="cell-text" text-anchor="middle">3</text>
  <text x="130" y="158" class="cell-text" text-anchor="middle">"Bona"</text>
  <text x="212" y="158" class="cell-text" text-anchor="middle">22</text>

  <!-- Label -->
  <text x="140" y="205" class="label" text-anchor="middle">Single flat row in a structured table</text>

  <!-- MIDDLE SEPARATOR -->
  <line x1="300" y1="30" x2="300" y2="210" class="sep-line" />

  <!-- RIGHT: MongoDB Document -->
  <text x="330" y="40" class="title">MongoDB (Document)</text>

  <!-- Document Container -->
  <rect x="330" y="60" width="240" height="110" class="doc-bg" />
  <text x="350" y="85" class="json-text" style="font-weight: bold; font-size: 13px;">{</text>
  <text x="370" y="105" class="json-text" style="font-weight: bold; font-size: 13px;">"_id": ObjectId("..."),</text>
  <text x="370" y="125" class="json-text" style="font-weight: bold; font-size: 13px;">"name": "Sok",</text>
  <text x="370" y="145" class="json-text" style="font-weight: bold; font-size: 13px;">"age": 19</text>
  <text x="350" y="163" class="json-text" style="font-weight: bold; font-size: 13px;">}</text>

  <!-- Label -->
  <text x="450" y="205" class="label" text-anchor="middle">Self-contained document (JSON/BSON)</text>
</svg>
