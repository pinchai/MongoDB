<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
    .desc { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .box { fill: #FAFAFA; stroke: #222222; stroke-width: 1.5; rx: 5; }
    .daemon-box { fill: #EAEAEA; stroke: #111111; stroke-width: 2; rx: 5; }
    .arrow { stroke: #222222; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- Clients (Compass / Mongosh) -->
  <g transform="translate(180, 20)">
    <rect x="0" y="0" width="240" height="50" class="box" />
    <text x="120" y="22" class="label" text-anchor="middle">Clients (Compass / Mongosh / App Drivers)</text>
    <text x="120" y="38" class="desc" text-anchor="middle">Sends Queries and CRUD Commands</text>
  </g>

  <!-- Arrow down to daemon -->
  <path d="M 300 70 L 300 95" class="arrow" />
  <polygon points="297,93 300,100 303,93" fill="#222222" />

  <!-- mongod Service Process -->
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="240" height="50" class="daemon-box" />
    <text x="120" y="22" class="label" text-anchor="middle">mongod (Service Daemon Process)</text>
    <text x="120" y="38" class="desc" text-anchor="middle">Handles Network requests &amp; Data access</text>
  </g>

  <!-- Arrow down to Database -->
  <path d="M 300 150 L 300 175" class="arrow" />
  <polygon points="297,173 300,180 303,173" fill="#222222" />

  <!-- MongoDB Database Files -->
  <g transform="translate(180, 180)">
    <rect x="0" y="0" width="240" height="45" class="box" />
    <text x="120" y="18" class="label" text-anchor="middle">MongoDB Database (Data Storage)</text>
    <text x="120" y="34" class="desc" text-anchor="middle">Stores Collections and Documents on disk</text>
  </g>
</svg>
