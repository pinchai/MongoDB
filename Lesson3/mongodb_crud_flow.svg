<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
    .code-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #222222; }
    .action-desc { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .box { fill: #FAFAFA; stroke: #222222; stroke-width: 1.5; rx: 5; }
    .sep-line { stroke: #DDDDDD; stroke-width: 1.2; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- Grid separators -->
  <line x1="300" y1="20" x2="300" y2="220" class="sep-line" />
  <line x1="20" y1="120" x2="580" y2="120" class="sep-line" />

  <!-- 1. CREATE -->
  <g transform="translate(30, 30)">
    <rect x="0" y="0" width="240" height="75" class="box" />
    <text x="15" y="22" class="label" fill="#111111">CREATE (Insert)</text>
    <text x="15" y="42" class="code-text">db.students.insertOne({name:"..."})</text>
    <text x="15" y="60" class="action-desc">Adds a new document to the collection</text>
  </g>

  <!-- 2. READ (Find) -->
  <g transform="translate(330, 30)">
    <rect x="0" y="0" width="240" height="75" class="box" />
    <text x="15" y="22" class="label" fill="#111111">READ (Retrieve)</text>
    <text x="15" y="42" class="code-text">db.students.find()</text>
    <text x="15" y="60" class="action-desc">Queries and lists documents in collection</text>
  </g>

  <!-- 3. UPDATE -->
  <g transform="translate(30, 135)">
    <rect x="0" y="0" width="240" height="75" class="box" />
    <text x="15" y="22" class="label" fill="#111111">UPDATE (Modify)</text>
    <text x="15" y="42" class="code-text">db.students.updateOne(filter, $set)</text>
    <text x="15" y="60" class="action-desc">Modifies key-values in existing document</text>
  </g>

  <!-- 4. DELETE -->
  <g transform="translate(330, 135)">
    <rect x="0" y="0" width="240" height="75" class="box" />
    <text x="15" y="22" class="label" fill="#111111">DELETE (Remove)</text>
    <text x="15" y="42" class="code-text">db.students.deleteOne(filter)</text>
    <text x="15" y="60" class="action-desc">Removes matching document from collection</text>
  </g>
</svg>
