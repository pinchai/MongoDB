<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Style Definitions -->
  <style>
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #111111; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #222222; }
    .bold-label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
    .desc-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .border-box { stroke: #222222; stroke-width: 1.5; fill: #FAFAFA; rx: 6; }
    .accent-box { stroke: #222222; stroke-width: 2; fill: #FAFAFA; rx: 6; }
    .arrow { stroke: #222222; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- Core Server -->
  <g transform="translate(200, 30)">
    <rect x="0" y="0" width="200" height="70" class="accent-box" />
    <text x="100" y="30" class="bold-label" text-anchor="middle">MongoDB Community Server</text>
    <text x="100" y="48" class="desc-text" text-anchor="middle">Core Database Engine</text>
    <text x="100" y="60" class="desc-text" text-anchor="middle">(Runs background service)</text>
  </g>

  <!-- Left arrow path -->
  <path d="M 250 100 L 250 120 L 130 120 L 130 145" class="arrow" />
  <polygon points="127,143 130,150 133,143" fill="#222222" />

  <!-- Right arrow path -->
  <path d="M 350 100 L 350 120 L 470 120 L 470 145" class="arrow" />
  <polygon points="467,143 470,150 473,143" fill="#222222" />

  <!-- Mongosh (Left Client) -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="200" height="70" class="border-box" />
    <text x="100" y="25" class="bold-label" text-anchor="middle">Mongosh</text>
    <text x="100" y="42" class="desc-text" text-anchor="middle">Command Line Interface</text>
    <text x="100" y="55" class="desc-text" text-anchor="middle">(Fast, shell-based commands)</text>
  </g>

  <!-- MongoDB Compass (Right Client) -->
  <g transform="translate(370, 150)">
    <rect x="0" y="0" width="200" height="70" class="border-box" />
    <text x="100" y="25" class="bold-label" text-anchor="middle">MongoDB Compass</text>
    <text x="100" y="42" class="desc-text" text-anchor="middle">Graphical User Interface (GUI)</text>
    <text x="100" y="55" class="desc-text" text-anchor="middle">(Visual CRUD &amp; charts)</text>
  </g>
</svg>
